  <text x="30" y="265" text-anchor="start" font-size="9" font-weight="normal" fill="#555">Note: Daisy Seed 3V3 is internally regulated by a second LDO on the module.</text>
  <text x="30" y="278" text-anchor="start" font-size="9" font-weight="normal" fill="#555">Pull-up resistors for pots and GPIO take 3V3 directly from Daisy pin 38.</text>
  <text x="30" y="291" text-anchor="start" font-size="9" font-weight="normal" fill="#555">D1 provides reverse-polarity protection on the 9V input rail.</text>
