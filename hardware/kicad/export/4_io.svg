<svg xmlns="http://www.w3.org/2000/svg" width="840" height="520" viewBox="0 0 840 520" font-family="monospace" font-size="11">
  <title>Audio I/O and Relay Bypass</title>
  <rect width="840" height="520" fill="white" stroke="none"/>
  <rect x="10" y="10" width="700" height="24" fill="#e8e8f0" stroke="#666" stroke-width="1.5"/>
  <text x="20" y="28" text-anchor="start" font-size="12" font-weight="bold" fill="#000">4 · Audio I/O + True-Bypass Relay  (G5V-1 SPDT)</text>
  <rect x="20" y="60" width="80" height="50" fill="#f9f9ff" stroke="#000" stroke-width="1.5"/>
  <text x="60.0" y="81.0" text-anchor="middle" font-size="10" font-weight="bold" fill="#000">J2</text>
  <text x="60.0" y="95.0" text-anchor="middle" font-size="9" font-weight="normal" fill="#000"><tspan x="60.0" dy="0">Input</tspan></text>
  <text x="60.0" y="109.0" text-anchor="middle" font-size="9" font-weight="normal" fill="#000"><tspan x="60.0" dy="1.3em">1/4" TS</tspan></text>
  <line x1="100" y1="85" x2="160" y2="85" stroke="#000" stroke-width="1.5"/>
  <rect x="340" y="140" width="40" height="30" fill="white" stroke="#000" stroke-width="1.5"/>
  <text x="360" y="160" text-anchor="middle" font-size="9" font-weight="normal" fill="#000">coil</text>
  <line x1="340" y1="155" x2="325" y2="155" stroke="#000" stroke-width="1.5"/>
  <line x1="380" y1="155" x2="395" y2="155" stroke="#000" stroke-width="1.5"/>
  <text x="360" y="130" text-anchor="middle" font-size="9" font-weight="normal" fill="#000">COM</text>
  <line x1="360" y1="140" x2="360" y2="115" stroke="#000" stroke-width="1.5"/>
  <text x="330" y="100" text-anchor="middle" font-size="9" font-weight="normal" fill="#000">NC</text>
  <line x1="340" y1="115" x2="360" y2="115" stroke="#000" stroke-width="1.5"/>
  <line x1="340" y1="115" x2="340" y2="90" stroke="#000" stroke-width="1.5"/>
  <text x="390" y="100" text-anchor="middle" font-size="9" font-weight="normal" fill="#000">NO</text>
  <line x1="380" y1="115" x2="360" y2="115" stroke="#000" stroke-width="1.5"/>
  <line x1="380" y1="115" x2="380" y2="90" stroke="#000" stroke-width="1.5"/>
  <line x1="160" y1="85" x2="360" y2="85" stroke="#000" stroke-width="1.5"/>
  <line x1="360" y1="85" x2="360" y2="115" stroke="#000" stroke-width="1.5"/>
  <line x1="340" y1="90" x2="200" y2="90" stroke="#000" stroke-width="1.5"/>
  <line x1="200" y1="90" x2="200" y2="280" stroke="#000" stroke-width="1.5"/>
  <line x1="200" y1="280" x2="650" y2="280" stroke="#000" stroke-width="1.5"/>
  <text x="420" y="272" text-anchor="middle" font-size="9" font-weight="normal" fill="#555">NC (bypass path)</text>
  <line x1="380" y1="90" x2="540" y2="90" stroke="#000" stroke-width="1.5"/>
  <text x="460" y="82" text-anchor="middle" font-size="9" font-weight="normal" fill="#555">NO (effect active path)</text>
  <rect x="540" y="70" width="140" height="34" fill="#d4edda" stroke="#000" stroke-width="1.5"/>
  <text x="610" y="82" text-anchor="middle" font-size="9" font-weight="bold" fill="#000">AUDIO_IN_L</text>
  <text x="610" y="96" text-anchor="middle" font-size="9" font-weight="normal" fill="#000">→ Daisy IN_L</text>
  <rect x="650" y="262" width="80" height="50" fill="#f9f9ff" stroke="#000" stroke-width="1.5"/>
  <text x="690.0" y="283.0" text-anchor="middle" font-size="10" font-weight="bold" fill="#000">J3</text>
  <text x="690.0" y="297.0" text-anchor="middle" font-size="9" font-weight="normal" fill="#000"><tspan x="690.0" dy="0">Output</tspan></text>
  <text x="690.0" y="311.0" text-anchor="middle" font-size="9" font-weight="normal" fill="#000"><tspan x="690.0" dy="1.3em">1/4" TS</tspan></text>
  <rect x="540" y="262" width="100" height="34" fill="#d4edda" stroke="#000" stroke-width="1.5"/>
  <text x="590" y="274" text-anchor="middle" font-size="8" font-weight="bold" fill="#000">AUDIO_OUT_L</text>
  <text x="590" y="288" text-anchor="middle" font-size="8" font-weight="normal" fill="#000">← Daisy OUT_L</text>
  <line x1="640" y1="279" x2="650" y2="279" stroke="#000" stroke-width="1.5"/>
  <text x="200" y="335" text-anchor="middle" font-size="11" font-weight="bold" fill="#000">Relay Driver</text>
  <line x1="280" y1="350" x2="280" y2="342" stroke="#000" stroke-width="1.5"/>
  <line x1="268" y1="342" x2="292" y2="342" stroke="#000" stroke-width="2"/>
  <text x="280" y="336" text-anchor="middle" font-size="9" font-weight="normal" fill="#000">+5V</text>
  <line x1="280" y1="350" x2="280" y2="375" stroke="#000" stroke-width="1.5"/>
  <rect x="245" y="375" width="70" height="50" fill="#f9f9ff" stroke="#000" stroke-width="1.5"/>
  <text x="280.0" y="396.0" text-anchor="middle" font-size="10" font-weight="bold" fill="#000">RLY1</text>
  <text x="280.0" y="410.0" text-anchor="middle" font-size="9" font-weight="normal" fill="#000"><tspan x="280.0" dy="0">G5V-1</tspan></text>
  <text x="280.0" y="424.0" text-anchor="middle" font-size="9" font-weight="normal" fill="#000"><tspan x="280.0" dy="1.3em">5V coil</tspan></text>
  <line x1="330" y1="390" x2="320.0" y2="390" stroke="#000" stroke-width="1.5"/>
  <polygon points="320.0,380 320.0,400 340.0,390" fill="#000"/>
  <line x1="340.0" y1="380" x2="340.0" y2="400" stroke="#000" stroke-width="2"/>
  <line x1="340.0" y1="390" x2="330" y2="350" stroke="#000" stroke-width="1.5"/>
  <text x="345" y="372" text-anchor="middle" font-size="9" font-weight="normal" fill="#000"><tspan x="345" dy="0">D2  1N4148</tspan></text>
  <text x="345" y="386" text-anchor="middle" font-size="9" font-weight="normal" fill="#000"><tspan x="345" dy="1.3em">flyback</tspan></text>
  <line x1="330" y1="390" x2="315" y2="390" stroke="#000" stroke-width="1.5"/>
  <line x1="330" y1="350" x2="280" y2="350" stroke="#000" stroke-width="1.5"/>
  <circle cx="280" cy="475" r="20" fill="white" stroke="#000" stroke-width="1.5"/>
  <line x1="260" y1="475" x2="270" y2="475" stroke="#000" stroke-width="1.5"/>
  <line x1="270" y1="460" x2="270" y2="490" stroke="#000" stroke-width="2"/>
  <line x1="270" y1="465" x2="295" y2="455" stroke="#000" stroke-width="1.5"/>
  <line x1="295" y1="455" x2="300" y2="455" stroke="#000" stroke-width="1.5"/>
  <line x1="270" y1="485" x2="295" y2="495" stroke="#000" stroke-width="1.5"/>
  <line x1="295" y1="495" x2="300" y2="495" stroke="#000" stroke-width="1.5"/>
  <polygon points="288,489 295,495 286,497" fill="#000"/>
  <line x1="280" y1="425" x2="280" y2="455" stroke="#000" stroke-width="1.5"/>
  <line x1="160" y1="475" x2="169.8" y2="475" stroke="#000" stroke-width="1.5"/>
  <rect x="169.8" y="469" width="78.4" height="12" fill="white" stroke="#000" stroke-width="1.5"/>
  <line x1="248.2" y1="475" x2="258" y2="475" stroke="#000" stroke-width="1.5"/>
  <text x="210" y="468" text-anchor="middle" font-size="9" font-weight="normal" fill="#000">R13  1kΩ</text>
  <rect x="20" y="462" width="140" height="26" fill="#d4edda" stroke="#000" stroke-width="1.5"/>
  <text x="90" y="470" text-anchor="middle" font-size="9" font-weight="bold" fill="#000">RELAY_CTL</text>
  <text x="90" y="483" text-anchor="middle" font-size="9" font-weight="normal" fill="#000">← Daisy D5</text>
  <line x1="280" y1="495" x2="280" y2="510" stroke="#000" stroke-width="1.5"/>
  <line x1="280" y1="510" x2="280" y2="518" stroke="#000" stroke-width="1.5"/>
  <line x1="268" y1="518" x2="292" y2="518" stroke="#000" stroke-width="2"/>
  <line x1="272" y1="523" x2="288" y2="523" stroke="#000" stroke-width="1.5"/>
  <line x1="276" y1="528" x2="284" y2="528" stroke="#000" stroke-width="1.5"/>
  <text x="540" y="335" text-anchor="middle" font-size="11" font-weight="bold" fill="#000">Bypass LED</text>
  <rect x="455" y="348" width="130" height="26" fill="#d4edda" stroke="#000" stroke-width="1.5"/>
  <text x="520" y="356" text-anchor="middle" font-size="9" font-weight="bold" fill="#000">LED_BYPASS</text>
  <text x="520" y="369" text-anchor="middle" font-size="9" font-weight="normal" fill="#000">← Daisy D6</text>
  <line x1="520" y1="374" x2="520" y2="390" stroke="#000" stroke-width="1.5"/>
  <line x1="520" y1="390" x2="520" y2="395.0" stroke="#000" stroke-width="1.5"/>
  <rect x="514" y="395.0" width="12" height="40.0" fill="white" stroke="#000" stroke-width="1.5"/>
  <line x1="520" y1="435.0" x2="520" y2="440" stroke="#000" stroke-width="1.5"/>
  <text x="535" y="417" text-anchor="middle" font-size="9" font-weight="normal" fill="#000">R14  470Ω</text>
  <line x1="520" y1="440" x2="510.0" y2="440" stroke="#000" stroke-width="1.5"/>
  <polygon points="510.0,430 510.0,450 530.0,440" fill="#000"/>
  <line x1="530.0" y1="430" x2="530.0" y2="450" stroke="#000" stroke-width="2"/>
  <line x1="530.0" y1="440" x2="520" y2="490" stroke="#000" stroke-width="1.5"/>
  <line x1="520.0" y1="426" x2="512.0" y2="414" stroke="#888" stroke-width="1.5"/>
  <line x1="526.0" y1="426" x2="518.0" y2="414" stroke="#888" stroke-width="1.5"/>
  <text x="538" y="468" text-anchor="middle" font-size="9" font-weight="normal" fill="#000">LED1  Red 3mm</text>
  <line x1="520" y1="490" x2="520" y2="498" stroke="#000" stroke-width="1.5"/>
  <line x1="508" y1="498" x2="532" y2="498" stroke="#000" stroke-width="2"/>
  <line x1="512" y1="503" x2="528" y2="503" stroke="#000" stroke-width="1.5"/>
  <line x1="516" y1="508" x2="524" y2="508" stroke="#000" stroke-width="1.5"/>
  <text x="20" y="420" text-anchor="start" font-size="9" font-weight="normal" fill="#555">Relay: COM = input tip.  NC = output tip (bypass, relay off).  NO = output tip (effect, relay on).</text>
  <text x="20" y="433" text-anchor="start" font-size="9" font-weight="normal" fill="#555">When RELAY_CTL HIGH: Q1 saturates, coil energised, NO selected → effect signal routed to output.</text>
  <text x="20" y="446" text-anchor="start" font-size="9" font-weight="normal" fill="#555">D2 clamps inductive spike when Q1 turns off.  Q1 base current ≈ 3mA (Vcc=3.3V, R13=1kΩ).</text>
</svg>
