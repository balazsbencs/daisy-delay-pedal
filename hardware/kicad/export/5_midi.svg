  <text x="690" y="127" text-anchor="middle" font-size="10" font-weight="bold" fill="#000">MIDI_RX</text>
  <text x="690" y="141" text-anchor="middle" font-size="9" font-weight="normal" fill="#000">→ Daisy D14 (UART1 RX)</text>
  <rect x="20" y="260" width="770" height="60" fill="#fff9e6" stroke="#cca" stroke-width="1.5"/>
  <text x="405" y="278" text-anchor="middle" font-size="11" font-weight="bold" fill="#000">USB MIDI</text>
  <text x="405" y="295" text-anchor="middle" font-size="10" font-weight="normal" fill="#000">Connect Daisy USB port directly to host. No extra components needed.</text>
  <text x="405" y="312" text-anchor="middle" font-size="9" font-weight="normal" fill="#000">libDaisy MidiUsbHandler handles enumeration and parsing natively.</text>
  <text x="20" y="345" text-anchor="start" font-size="9" font-weight="normal" fill="#555">TRS Type-A (MIDI 1.0 spec): tip = DIN-5 pin 5 (current sink), ring = DIN-5 pin 4 (current source).</text>
  <text x="20" y="358" text-anchor="start" font-size="9" font-weight="normal" fill="#555">6N138 provides full galvanic isolation between MIDI source and Daisy ground.</text>
  <text x="20" y="371" text-anchor="start" font-size="9" font-weight="normal" fill="#555">R17 pull-up inverts the open-collector output: idle line = HIGH (MIDI mark state).</text>
</svg>
